<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Netflix Clone</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">NETFLIX</div>

    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">TV Shows</a></li>
        <li><a href="#">Movies</a></li>
        <li><a href="#">New & Popular</a></li>
        <li><a href="#">My List</a></li>
      </ul>
    </nav>

    <button class="sign-btn">Sign In</button>
  </header>

  <!-- Hero Section -->
  <section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">
      <h1>Unlimited movies, TV shows and more.</h1>

      <p>
        Watch anywhere. Cancel anytime.
      </p>

      <button class="watch-btn">Watch Now</button>
    </div>

  </section>

  <!-- Movie Sections -->
  <section class="movies-section">

    <h2>Trending Now</h2>

    <div class="movies-row">

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1518929458119-e5bf444c30f4?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

    </div>

  </section>

  <section class="movies-section">

    <h2>Popular on Netflix</h2>

    <div class="movies-row">

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1505685296765-3a2736de412f?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1170&auto=format&fit=crop" alt="">
      </div>

    </div>

  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Netflix Clone UI | Created by Anisur Rahman Farazi</p>
  </footer>

</body>
</html>
